# Reusable quality gate: lint, type check, schema validation, scenario tests,
# build, and the offline pytest matrix. Called by ci.yml (every push/PR) and
# release.yml (pinned to the release tag) so both paths run identical checks.
name: quality

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out (empty = the triggering ref)
        type: string
        required: false
        default: ""

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Lint
        run: uv run --extra dev ruff check src tests scripts
      - name: Type check
        run: uv run --all-extras mypy
      - name: Reject stale or modified demo assets
        run: uv run python scripts/demo_assets.py check-drift
      - name: Validate example machines against the schema
        run: >
          uv run --with check-jsonschema
          check-jsonschema --default-filetype yaml
          --schemafile schema/mklang.schema.json examples/*.mk
      - name: Validate the runtime config against its schema
        run: >
          uv run --with check-jsonschema
          check-jsonschema --default-filetype yaml
          --schemafile config/runtime.schema.json config/runtime.example.yaml
      - name: Semantic check + static analysis on examples, stdlib, and init sample
        run: |
          uv run mklang check examples/*.mk src/mklang/data/stdlib/*.mk src/mklang/data/init/*.mk
          uv run mklang lint --strict examples/*.mk src/mklang/data/stdlib/*.mk src/mklang/data/init/*.mk
      - name: Deterministic scenario tests (scripted LLM — no API keys)
        run: |
          uv run mklang test examples/triage.mk --script examples/triage.test.yaml
          uv run mklang test src/mklang/data/init/hello.mk --script src/mklang/data/init/hello.test.yaml
      - name: Shellcheck the install script
        run: shellcheck scripts/install.sh
      - name: Build sdist + wheel
        run: uv build

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python }}
      # The coverage gate ([tool.coverage.report] fail_under) fires only on the
      # canonical leg; instrumenting every leg adds runtime for no extra signal,
      # and platform-specific skips would shift the number. The console ships
      # in the core dependencies since 0.15.0 — no extra needed.
      - name: Unit tests (MockLLM — no network, incl. MCP + console surface)
        run: >
          uv run --extra dev --extra mcp pytest -q
          ${{ (matrix.os == 'ubuntu-latest' && matrix.python == '3.13')
              && '--cov=mklang --cov-report=term-missing' || '' }}
