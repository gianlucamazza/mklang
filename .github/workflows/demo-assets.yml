name: Demo assets

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: demo-assets
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      BRANCH: automation/demo-assets
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Install pinned VHS and media tools
        env:
          VHS_VERSION: 0.11.0
          VHS_SHA256: 99cb634587eaae0473c1ea377db80c3a048c27f99fe0a7febb1a1e8cb7ee5009
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg ttyd
          archive="$RUNNER_TEMP/vhs.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz" \
            --output "$archive"
          echo "$VHS_SHA256  $archive" | sha256sum --check --strict
          mkdir -p "$RUNNER_TEMP/vhs/bin"
          tar -xzf "$archive" --strip-components=1 -C "$RUNNER_TEMP/vhs/bin" \
            "vhs_${VHS_VERSION}_Linux_x86_64/vhs"
          echo "$RUNNER_TEMP/vhs/bin" >> "$GITHUB_PATH"
      - name: Render and validate live DeepSeek demos
        run: uv run python scripts/demo_assets.py all
      - uses: actions/upload-artifact@v7
        with:
          name: demo-assets-preview
          path: docs/assets/demos/
          if-no-files-found: error
      - name: Push the generated asset branch
        id: push
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch --force-create "$BRANCH"
          git add docs/assets/demos
          if git diff --cached --quiet; then
            echo "Demo assets are already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "docs: regenerate live demo assets"
          git push --force-with-lease origin "HEAD:$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Open or update the review PR
        if: steps.push.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$pr" ]; then
            gh pr comment "$pr" --body "Demo assets regenerated from the current main branch. Please repeat the visual review checklist in the PR description."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: regenerate live demo assets" \
            --body-file .github/demo-assets-pr.md
