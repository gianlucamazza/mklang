name: Demo assets

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: demo-assets
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      BRANCH: automation/demo-assets
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v9.0.0
      - name: Install pinned VHS, font, and media tools
        run: |
          set -a
          source demos/toolchain.conf
          set +a
          sudo apt-get update
          sudo apt-get install --yes ffmpeg ttyd unzip
          vhs_archive="$RUNNER_TEMP/vhs.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz" \
            --output "$vhs_archive"
          echo "$VHS_ARCHIVE_SHA256  $vhs_archive" | sha256sum --check --strict
          mkdir -p "$RUNNER_TEMP/vhs/bin"
          tar -xzf "$vhs_archive" --strip-components=1 -C "$RUNNER_TEMP/vhs/bin" \
            "vhs_${VHS_VERSION}_Linux_x86_64/vhs"
          echo "$RUNNER_TEMP/vhs/bin" >> "$GITHUB_PATH"

          font_archive="$RUNNER_TEMP/JetBrainsMono.zip"
          curl --fail --location --silent --show-error \
            "https://github.com/JetBrains/JetBrainsMono/releases/download/v${FONT_VERSION}/JetBrainsMono-${FONT_VERSION}.zip" \
            --output "$font_archive"
          echo "$FONT_ARCHIVE_SHA256  $font_archive" | sha256sum --check --strict
          font_dir="$HOME/.local/share/fonts/JetBrainsMono"
          mkdir -p "$font_dir"
          for style in Regular Bold Italic BoldItalic; do
            unzip -j -q "$font_archive" "fonts/ttf/JetBrainsMono-${style}.ttf" -d "$font_dir"
          done
          fc-cache --force "$font_dir"
          test "$(fc-match --format='%{family}' "$FONT_FAMILY")" = "$FONT_FAMILY"
      - name: Render and validate live DeepSeek demos
        run: uv run --extra console python scripts/demo_assets.py all
      - uses: actions/upload-artifact@v7
        with:
          name: demo-assets-preview
          path: docs/assets/demos/
          if-no-files-found: error
      - name: Push the generated asset branch
        id: push
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch --force-create "$BRANCH"
          git add docs/assets/demos
          if git diff --cached --quiet; then
            echo "Demo assets are already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "docs: regenerate live demo assets"
          git push --force-with-lease origin "HEAD:$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Open or update the review PR
        if: steps.push.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$pr" ]; then
            gh pr comment "$pr" --body "Demo assets regenerated from the current main branch. Please repeat the visual review checklist in the PR description."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: regenerate live demo assets" \
            --body-file .github/demo-assets-pr.md
