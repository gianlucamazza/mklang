site_name: mklang
site_description: A declarative language for LLM-driven state machines.
site_url: https://gianlucamazza.github.io/mklang/
repo_url: https://github.com/gianlucamazza/mklang
repo_name: gianlucamazza/mklang
docs_dir: site-src # generated — run scripts/build-docs.sh first

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/weather-sunny, name: Light mode }
  features:
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Language:
      - Specification: SPEC.md
      - Cheatsheet: cheatsheet.md
      - Conformance: conformance.md
  - Guides:
      - Installation: install.md
      - Authoring guide: authoring.md
      - Best practices: best-practices.md
      - Patterns: patterns.md
      - Console: console.md
      - Live demos: demos.md
  - Reference:
      - CLI: cli.md
      - Machine stdlib: stdlib.md
      - Interpreter architecture: architecture.md
  # Individual ADRs stay published at /adr/NNNN-*/ but out of the nav:
  # the index table is the entry point, so the sidebar doesn't grow with
  # every new decision.
  - Decisions (ADRs): adr/README.md
  - Research:
      - Gate divergence: experiments/gate-divergence.md
  - Project:
      - Roadmap: ROADMAP.md
      - Changelog: CHANGELOG.md
      - Contributing: CONTRIBUTING.md
