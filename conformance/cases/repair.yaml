case: repair
description: A repair gate re-runs the state with feedback and decrements its budget.
machine:
  machine: repair
  entry: a
  budget: 10
  states:
    a:
      structure: s
      prompt: draft
      output: o
      gates:
        - { when: the draft is complete, then: ok, to: END }
        - { when: the draft has gaps, repair: 2, to: a }
llm:
  produce: ["v1", "v2"]
  judge: [1, 0]
expect:
  status: done
  result: "v2"
  trace:
    - { state: a, policy: repair, to: a }
    - { state: a, policy: ok, to: END }
